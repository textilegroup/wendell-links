<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Diagnóstico Bitrix</title>
<script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body>

<h2>Diagnóstico Bitrix</h2>
<pre id="out">Carregando...</pre>

<script>
BX24.init(function () {

    document.getElementById('out').innerHTML =
        'Aplicativo conectado ao Bitrix.\n\n';

    BX24.callMethod(
        'placement.get',
        {},
        function(result){

            if(result.error()){
                document.getElementById('out').innerHTML +=
                    'ERRO:\n' + result.error();
            }else{
                document.getElementById('out').innerHTML +=
                    JSON.stringify(result.data(), null, 2);
            }

        }
    );

});
</script>

</body>
</html>
