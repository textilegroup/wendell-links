<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Instalação Bitrix</title>
<script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body>
<h3>Instalando aplicativo...</h3>
<div id="status">Aguardando Bitrix...</div>

<script>
BX24.init(function () {
  document.getElementById("status").innerHTML = "Bitrix conectado. Registrando botão...";

  BX24.callMethod(
    "placement.bind",
    {
      PLACEMENT: "CRM_DEAL_LIST_TOOLBAR",
      HANDLER: "https://textilegroup.github.io/wendell-links/",
      TITLE: "Como funciona",
      DESCRIPTION: "Manual do funil"
    },
    function(result) {
      if (result.error()) {
        document.getElementById("status").innerHTML = "Erro: " + result.error();
      } else {
        document.getElementById("status").innerHTML = "Botão registrado com sucesso.";
        BX24.installFinish();
      }
    }
  );
});
</script>
</body>
</html>
